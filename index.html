  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

rm: none; display: inline-block; white-space: nowrap; direction: ltr; -webkit-font-feature-settings: 'liga'; }\n  ::-webkit-scrollbar { width: 10px; height: 10px; }\n  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.18); border-radius: 8px; }\n  @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }\n  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }\n  @keyframes pop { from { transform: scale(.96) translateY(8px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; display: flex; flex-direction: column;\">\n\n  <!-- ===== HERO HEADER ===== -->\n  <header style=\"background: {{ heroBg }}; color: #fff; position: relative; overflow: hidden;\">\n    <div style=\"position: absolute; inset: 0; background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.06) 1px, transparent 0); background-size: 22px 22px; pointer-events: none;\"><\u002Fdiv>\n    <div style=\"position: absolute; right: -80px; top: -80px; width: 320px; height: 320px; border-radius: 50%; background: rgba(255,255,255,.05); pointer-events: none;\"><\u002Fdiv>\n    <div style=\"max-width: 1280px; margin: 0 auto; padding: 22px 28px; position: relative; display: flex; align-items: center; gap: 22px; flex-wrap: wrap;\">\n      <div style=\"width: 66px; height: 66px; border-radius: 18px; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(0,0,0,.22); flex-shrink: 0; overflow: hidden;\">\n        <img src=\"f1f87f27-bc2e-4cb6-822a-9c33bd1bf210\" alt=\"THAMC\" style=\"width: 60px; height: 60px; object-fit: contain;\">\n      <\u002Fdiv>\n      <div style=\"flex: 1; min-width: 240px;\">\n        <div style=\"font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; color: rgba(255,255,255,.66); margin-bottom: 4px;\">THAMC · Finance &amp; Accounting Intranet<\u002Fdiv>\n        <h1 style=\"margin: 0; font-size: 27px; font-weight: 700; line-height: 1.15;\">{{ title }}<\u002Fh1>\n        <div style=\"margin-top: 5px; font-size: 14px; color: rgba(255,255,255,.82); font-weight: 300;\">{{ subtitle }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; align-items: flex-end; gap: 12px;\">\n        <sc-if value=\"{{ showClockFlag }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; color: rgba(255,255,255,.85); background: rgba(0,0,0,.16); padding: 6px 12px; border-radius: 999px; white-space: nowrap;\">{{ clock }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <button onclick=\"{{ onOpenAdmin }}\" style=\"display: inline-flex; align-items: center; gap: 7px; background: #E7B53C; color: #3a2306; border: none; padding: 10px 16px; border-radius: 11px; font-family: 'IBM Plex Sans Thai', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; box-shadow: 0 4px 12px rgba(0,0,0,.18);\" style-hover=\"background: #f0c252;\">\n          <span class=\"msym\" style=\"font-size: 19px;\">settings<\u002Fspan>ผู้ดูแลระบบ\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- search + filters strip -->\n    <div style=\"max-width: 1280px; margin: 0 auto; padding: 0 28px 22px; position: relative; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;\">\n      <div style=\"position: relative; flex: 1; min-width: 240px; max-width: 460px;\">\n        <span class=\"msym\" style=\"position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 20px; color: rgba(255,255,255,.7);\">search<\u002Fspan>\n        <input value=\"{{ search }}\" oninput=\"{{ onSearch }}\" placeholder=\"ค้นหาระบบ เช่น เบิกวัสดุ, ครุภัณฑ์, PO...\" style=\"width: 100%; padding: 11px 14px 11px 44px; border-radius: 12px; border: 1px solid rgba(255,255,255,.25); background: rgba(255,255,255,.14); color: #fff; font-family: 'IBM Plex Sans Thai', sans-serif; font-size: 14.5px; outline: none;\" style-focus=\"background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.5);\">\n      <\u002Fdiv>\n      <div style=\"display: flex; gap: 8px; flex-wrap: wrap; overflow-x: auto;\">\n        <sc-for list=\"{{ chips }}\" as=\"chip\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{ chip.onClick }}\" style=\"{{ chip.style }}\">{{ chip.label }}<span style=\"opacity:.6; margin-left:5px;\">{{ chip.count }}<\u002Fspan><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== MAIN ===== -->\n  <main style=\"max-width: 1280px; margin: 0 auto; width: 100%; padding: 30px 28px 60px; flex: 1;\">\n\n    <!-- favorites -->\n    <sc-if value=\"{{ showFav }}\" hint-placeholder-val=\"{{ false }}\">\n      <section style=\"margin-bottom: 34px;\">\n        <div style=\"display: flex; align-items: center; gap: 9px; margin-bottom: 14px;\">\n          <span class=\"msym\" style=\"font-size: 21px; color: #E7B53C;\">star<\u002Fspan>\n          <h2 style=\"margin: 0; font-size: 16px; font-weight: 600; color: #4a3f3b;\">เข้าใช้บ่อย<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"{{ gridStyle }}\">\n          <sc-for list=\"{{ favSystems }}\" as=\"sys\" hint-placeholder-count=\"3\">\n            <a href=\"{{ sys.url }}\" target=\"_blank\" rel=\"noopener\" style=\"{{ cardStyle }}\" style-hover=\"transform: translateY(-3px); box-shadow: 0 12px 28px rgba(40,20,10,.13); border-color: rgba(0,0,0,.04);\">\n              <button onclick=\"{{ sys.onToggleFav }}\" title=\"ปักหมุด\" style=\"position: absolute; top: 14px; right: 14px; background: none; border: none; cursor: pointer; padding: 2px; line-height: 0;\"><span class=\"msym\" style=\"font-size: 20px; color: {{ sys.starColor }};\">{{ sys.favIcon }}<\u002Fspan><\u002Fbutton>\n              <div style=\"width: 52px; height: 52px; border-radius: 14px; background: {{ sys.tint }}; color: {{ sys.colo ction>\n    <\u002Fsc-for>\n\n    <!-- empty state -->\n    <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align: center; padding: 80px 20px; color: #a89e98;\">\n        <span class=\"msym\" style=\"font-size: 56px; color: #d6cdc7;\">search_off<\u002Fspan>\n        <div style=\"margin-top: 14px; font-size: 16px; font-weight: 500; color: #6b615c;\">ไม่พบระบบที่ตรงกับการค้นหา<\u002Fdiv>\n        <div style=\"margin-top: 5px; font-size: 14px;\">ลองเปลี่ยนคำค้นหา หรือเลือกหมวด \"ทั้งหมด\"<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fmain>\n\n  <footer style=\"border-top: 1px solid rgba(0,0,0,.07); padding: 18px 28px; text-align: center; font-size: 12.5px; color: #a89e98;\">\n    © {{ year }} ฝ่ายการเงินและบัญชี · ศูนย์การแพทย์ธรรมศาสตร์ — ระบบสารสนเทศภายใน (Intranet)\n  <\u002Ffooter>\n\n  <!-- ===== ADMIN SLIDE-OVER ===== -->\n  <sc-if value=\"{{ adminOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; inset: 0; z-index: 60;\">\n      <div onclick=\"{{ onCloseAdmin }}\" style=\"position: absolute; inset: 0; background: rgba(20,10,8,.45);\"><\u002Fdiv>\n      <aside style=\"position: absolute; top: 0; right: 0; height: 100%; width: 560px; max-width: 100%; background: #F7F4F1; box-shadow: -8px 0 32px rgba(0,0,0,.22); display: flex; flex-direction: column;\">\n        <!-- panel head -->\n        <div style=\"background: {{ heroBg }}; color: #fff; padding: 18px 22px; display: flex; align-items: center; gap: 12px;\">\n          <span class=\"msym\" style=\"font-size: 24px;\">admin_panel_settings<\u002Fspan>\n          <div style=\"flex: 1;\">\n            <div style=\"font-size: 17px; font-weight: 600;\">ตั้งค่าผู้ดูแลระบบ<\u002Fdiv>\n            <div style=\"font-size: 12px; color: rgba(255,255,255,.72);\">จัดการระบบ หมวดหมู่ และการแสดงผล<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ onCloseAdmin }}\" style=\"background: rgba(255,255,255,.15); border: none; color: #fff; width: 34px; height: 34px; border-radius: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center;\"><span class=\"msym\" style=\"font-size: 20px;\">close<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n        <!-- tabs -->\n        <div style=\"display: flex; gap: 4px; padding: 12px 16px 0; background: #F7F4F1; border-bottom: 1px solid rgba(0,0,0,.07);\">\n          <button onclick=\"{{ onTabSystems }}\" style=\"{{ tabSystemsStyle }}\"><span class=\"msym\" style=\"font-size:18px; vertical-align:-3px; margin-right:5px;\">apps<\u002Fspan>ระบบทั้งหมด<\u002Fbutton>\n          <button onclick=\"{{ onTabCats }}\" style=\"{{ tabCatsStyle }}\"><span class=\"msym\" style=\"font-size:18px; vertical-align:-3px; margin-right:5px;\">category<\u002Fspan>หมวดหมู่<\u002Fbutton>\n          <button onclick=\"{{ onTabGeneral }}\" style=\"{{ tabGeneralStyle }}\"><span class=\"msym\" style=\"font-size:18px; vertical-align:-3px; margin-right:5px;\">tune<\u002Fspan>ทั่วไป<\u002Fbutton>\n        <\u002Fdiv>\n        <!-- scroll body -->\n        <div style=\"flex: 1; overflow-y: auto; padding: 18px 20px 40px;\">\n\n          <!-- TAB: systems -->\n          <sc-if value=\"{{ tabSystems }}\" hint-placeholder-val=\"{{ true }}\">\n            <div>\n              <button onclick=\"{{ onAddNew }}\" style=\"width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 13px; border: 1.5px dashed #c9b08a; background: #fff; color: #9E1B34; border-radius: 12px; font-family: 'IBM Plex Sans Thai', sans-serif; font-weight: 600; font-size: 14.5px; cursor: pointer; margin-bottom: 16px;\" style-hover=\"background: #fff8ec; border-color: #9E1B34;\"><span class=\"msym\" style=\"font-size: 20px;\">add_circle<\u002Fspan>เพิ่มระบบใหม่<\u002Fbutton>\n              <div style=\"display: flex; flex-direction: column; gap: 9px;\">\n                <sc-for list=\"{{ adminSystems }}\" as=\"row\" hint-placeholder-count=\"6\">\n                  <div style=\"{{ row.rowStyle }}\">\n                    <div style=\"width: 40px; height: 40px; border-radius: 10px; background: {{ row.tint }}; color: {{ row.color }}; display: flex; align-items: center; justify-content: center; flex-shrink: 0;\"><span class=\"msym\" style=\"font-size: 22px;\">{{ row.icon }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"flex: 1; min-width: 0;\">\n                      <div style=\"font-size: 14px; font-weight: 600; color: #2c2421; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ row.name }}<\u002Fdiv>\n                      <div style=\"font-size: 11.5px; color: #a89e98; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ row.categoryLabel }}{{ row.hiddenTag }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"display: flex; align-items: center; gap: 2px; flex-shrink: 0;\">\n                      <button onclick=\"{{ row.onUp }}\" title=\"เลื่อนขึ้น\" style=\"{{ row.upStyle }}\"><span class=\"msym\" style=\"font-size: 18px;\">keyboard_arrow_up<\u002Fspan><\u002Fbutton>\n                      <button onclick=\"{{ row.onDown }}\" title=\"เลื่อนลง\" style=\"{{ row.downStyle }}\"><span class=\"msym\" style=\"font-size: 18px;\">keyboard_arrow_down<\u002Fspan><\u002Fbutton>\n                      <button onclick=\"{{ row.onHide }}\" title=\"ซ่อน/แสดง\" style=\"background: none; border: none; cursor: pointer; padding: 5px; color: #8a807a; line-height: 0;\"><span class=\"msym\" style=\"font-size: 19px;\">{{ row.hideIcon }}<\u002Fspan><\u002Fbutton>\n                      <button onclick=\"{{ row.onEdit }}\" title=\"แก้ไข\" style=\"background: none; border: none; cursor: pointer; padding: 5px; color: #2f6f55; line-height: 0;\"><span class=\"msym\" style=\"font-size: 19px;\">edit<\u002Fspan><\u002Fbutton>\n                      <button onclick=\"{{ row.onDelete }}\" title=\"ลบ\" style=\"background: none; border: none; cursor: pointer; padding: 5px; color: #b23b3b; line-height: 0;\"><span class=\"msym\" style=\"font-size: 19px;\">delete<\u002Fspan><\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- TAB: categories -->\n          <sc-if value=\"{{ tabCats }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <div style=\"display: flex; gap: 8px; margin-bottom: 16px;\">\n                <input value=\"{{ newCatName }}\" oninput=\"{{ onNewCatName }}\" placeholder=\"ชื่อหมวดหมู่ใหม่\" style=\"flex: 1; padding: 11px 13px; border: 1px solid #ddd2ca; border-radius: 10px; font-family: 'IBM Plex Sans Thai', sans-serif; font-size: 14px; outline: none;\" style-focus=\"border-color: #9E1B34;\">\n                <button onclick=\"{{ onAddCat }}\" style=\"background: #9E1B34; color: #fff; border: none; padding: 0 18px; border-radius: 10px; font-family: 'IBM Plex Sans Thai', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer;\">เพิ่ม<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 9px;\">\n                <sc-for list=\"{{ adminCategories }}\" as=\"cat\" hint-placeholder-count=\"5\">\n                  <div style=\"display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid rgba(0,0,0,.07); border-radius: 12px; padding: 9px 11px;\">\n                    <span style=\"width: 16px; height: 16px; border-radius: 5px; background: {{ cat.color }}; flex-shrink: 0;\"><\u002Fspan>\n                    <input value=\"{{ cat.label }}\" oninput=\"{{ cat.onRename }}\" style=\"flex: 1; min-width: 0; border: none; background: none; font-family: 'IBM Plex Sans Thai', sans-serif; font-size: 14px; font-weight: 500; color: #2c2421; outline: none; padding: 4px;\">\n                    <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #a89e98;\">{{ cat.countLabel }}<\ >รหัสผ่านไม่ถูกต้อง<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display: flex; gap: 10px; margin-top: 20px;\">\n          <button onclick=\"{{ onPwCancel }}\" style=\"flex: 1; padding: 11px; border: 1px solid #ddd2ca; background: #fff; color: #6b615c; border-radius: 10px; font-family: 'IBM Plex Sans Thai', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer;\">ยกเลิก<\u002Fbutton>\n          <button onclick=\"{{ onPwSubmit }}\" style=\"flex: 1; padding: 11px; border: none; background: #9E1B34; color: #fff; border-radius: 10px; font-family: 'IBM Plex Sans Thai', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px;\"><span class=\"msym\" style=\"font-size: 18px;\">login<\u002Fspan>เข้าสู่ระบบ<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  \n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#9E1B34&quot;,&quot;options&quot;:[&quot;#9E1B34&quot;,&quot;#7D1428&quot;,&quot;#167C5C&quot;,&quot;#44607E&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;ธีม&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;comfortable&quot;,&quot;compact&quot;],&quot;default&quot;:&quot;comfortable&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;การแสดงผล&quot;},&quot;showClock&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;การแสดงผล&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.KEY = 'thamc_intranet_v1';\n    this.PALETTE = ['#9E1B34','#B5532A','#C28A1E','#167C5C','#2E7D8C','#44607E','#6E5AA0','#555B6E'];\n    this.ICONS = ['database','inventory_2','shopping_cart_checkout','move_to_inbox','medication','vaccines','local_pharmacy','monitoring','receipt_long','request_quote','qr_code_scanner','assignment_turned_in','fact_check','inventory','account_balance','payments','calculate','sell','label','print','summarize','description','folder_open','dashboard','bar_chart','table_chart','verified_user','build','local_shipping','warehouse','badge','contract'];\n    this.state = {\n      systems: [], categories: [], favorites: [],\n      title: 'ระบบสารสนเทศ ฝ่ายการเงินและบัญชี',\n      subtitle: 'ศูนย์การแพทย์ธรรมศาสตร์ · โรงพยาบาลธรรมศาสตร์เฉลิมพระเกียรติ',\n      search: '', activeCat: 'all',\n      pwOpen: false, pwValue: '', pwError: false, adminAuthed: false,\n      adminOpen: false, adminTab: 'systems',\n      editing: null, newCatName: '', clock: '', loaded: false\n    };\n  }\n\n  componentDidMount() {\n    this.load();\n    this.tick();\n    this._t = setInterval(() => this.tick(), 1000);\n  }\n  componentWillUnmount() { clearInterval(this._t); }\n\n  tick() {\n    const d = new Date();\n    const days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];\n    const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];\n    const p = n => String(n).padStart(2, '0');\n    this.setState({ clock: 'วัน' + days[d.getDay()] + 'ที่ ' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + (d.getFullYear() + 543) + ' · ' + p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds()) });\n  }\n\n  defaults() {\n    const categories = [\n      { id: 'inv', label: 'คลังวัสดุ & สต็อก', color: '#9E1B34' },\n      { id: 'med', label: 'เวชภัณฑ์', color: '#167C5C' },\n      { id: 'pur', label: 'จัดซื้อจัดจ้าง', color: '#C28A1E' },\n      { id: 'ast', label: 'ครุภัณฑ์ & ทรัพย์สิน', color: '#44607E' },\n      { id: 'tool', label: 'เครื่องมือการเงิน', color: '#6E5AA0' }\n    ];\n    const systems = [\n      { id: 's1', name: ' จสอบสาขาธนาคาร', desc: 'ค้นหา/ตรวจสอบรหัสสาขาธนาคาร', url: 'https://script.google.com/macros/s/AKfycbzA047A9K6ipRIE54yQTMvwFp2Da3rzF_YPVbE2StWjzLI18IeuNbyMGkYKvEXTtjPK/exec', categoryId: 'tool', icon: 'account_balance', color: '#6E5AA0', hidden: false },\n      { id: 's9', name: 'คำนวณราคาขาย', desc: 'คำนวณราคาขายสินค้า/เวชภัณฑ์', url: 'https://script.google.com/macros/s/AKfycbyak_nQswV8MA9aNy9g8tV1dnJ2FSWUS6aQALzd7fHhAv5RuXfBgUsyIFiZEBSEqdbjTw/exec', categoryId: 'tool', icon: 'calculate', color: '#8A5A2B', hidden: false },\n      { id: 's10', name: 'Pro Label', desc: 'ออกแบบและพิมพ์ฉลากสินค้า', url: 'https://script.google.com/macros/s/AKfycbxYhmOrShslVH8BjRYrDNYwLvvjIdsyhqpHQf8uK9aZUImw1ZonlvhEmQezr13qRIKL/exec', categoryId: 'tool', icon: 'label', color: '#555B6E', hidden: false }\n    ];\n    return { categories, systems };\n  }\n\n  load() {\n    try {\n      const raw = localStorage.getItem(this.KEY);\n      if (raw) {\n        const d = JSON.parse(raw);\n        this.setState({ systems: d.systems || [], categories: d.categories || [], favorites: d.favorites || [], title: d.title || this.state.title, subtitle: d.subtitle || this.state.subtitle, loaded: true });\n        return;\n      }\n    } catch (e) {}\n    const def = this.defaults();\n    this.setState({ systems: def.systems, categories: def.categories, loaded: true }, () => this.persist());\n  }\n\n  persist() {\n    const { systems, categories, title, subtitle, favorites } = this.state;\n    try { localStorage.setItem(this.KEY, JSON.stringify({ systems, categories, title, subtitle, favorites })); } catch (e) {}\n  }\n  save(partial) { this.setState(partial, () => this.persist()); }\n\n  hexToRgba(hex, a) {\n    const h = (hex || '#888888').replace('#', '');\n    const r = parseInt(h.substring(0, 2), 16), g = parseInt(h.substring(2, 4), 16), b = parseInt(h.substring(4, 6), 16);\n    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';\n  }\n  shade(hex, pct) {\n    const h = (hex || '#9E1B34').replace('#', '');\n    let r = parseInt(h.substring(0, 2), 16), g = parseInt(h.substring(2, 4), 16), b = parseInt(h.substring(4, 6), 16);\n    const f = (1 + pct / 100);\n    r = Math.max(0, Math.min(255, Math.round(r * f)));\n    g = Math.max(0, Math.min(255, Math.round(g * f)));\n    b = Math.max(0, Math.min(255, Math.round(b * f)));\n    const t = n => n.toString(16).padStart(2, '0');\n    return '#' + t(r) + t(g) + t(b);\n  }\n\n  swap(arr, i, j) { const a = arr.slice(); const t = a[i]; a[i] = a[j]; a[j] = t; return a; }\n  moveItem(listName, id, dir) {\n    const arr = this.state[listName];\n    const i = arr.findIndex(x => x.id === id);\n    const j = i + dir;\n    if (i < 0 || j < 0 || j >= arr.length) return;\n    this.save({ [listName]: this.swap(arr, i, j) });\n  }\n\n  // ---- system ops ----\n  openNew() {\n    const cat = this.state.categories[0] || { id: 'inv' };\n    this.setState({ editing: { id: 'u' + Date.now(), name: '', desc: '', url: '', icon: 'dashboard', color: '#9E1B34', categoryId: cat.id, hidden: false, _isNew: true } });\n  }\n  openEdit(id) {\n    const s = this.state.systems.find(x => x.id === id);\n    if (s) this.setState({ editing: Object.assign({}, s) });\n  }\n  updateDraft(field, val) { this.setState(st => ({ editing: Object.assign({}, st.editing, { [field]: val }) })); }\n  saveEdit() {\n    const d = this.state.editing;\n    if (!d || !d.name.trim()) { alert('กรุณากรอกชื่อระบบ'); return; }\n    const clean = { id: d.id, name: d.name.trim(), desc: d.desc || '', url: d.url || '', icon: d.icon || 'dashboard', color: d.color || '#9E1B34', categoryId: d.categoryId, hidden: !!d.hidden };\n    const exists = this.state.systems.some(x => x.id === d.id);\n    const systems = exists ? this.state.systems.map(x => x.id === d.id ? clean : x) : this.state.systems.concat([clean]);\n    this.save({ systems, editing: null });\n  }\n  cancelEdit() { this.setState({ editing: null }); }\n  deleteSystem(id) {\n    const s = this.state.systems.find(x => x.id === id);\n    if (!confirm('ต้องการลบ \"' + (s ? s.name : '') + '\" ใช่หรือไม่?')) return;\n    this.save({ systems: this.state.systems.filter(x => x.id !== id), favorites: this.state.favorites.filter(f => f !== id) });\n  }\n  toggleHidden(id) { this.save({ systems: this.state.systems.map(x => x.id === id ? Object.assign({}, x, { hidden: !x.hidden }) : x) }); }\n  toggleFav(id) {\n    const f = this.state.favorites;\n    this.save({ favorites: f.includes(id) ? f.filter(x => x !== id) : f.concat([id]) });\n  }\n\n  // ---- admin auth ----\n  requestAdmin() {\n    if (this.state.adminAuthed) this.setState({ adminOpen: true, adminTab: 'systems' });\n    else this.setState({ pwOpen: true, pwValue: '', pwError: false });\n  }\n  submitPw() {\n    if ((this.state.pwValue || '').trim().toUpperCase() === 'SAWARIN') {\n      this.setState({ adminAuthed: true, pwOpen: false, pwValue: '', pwError: false, adminOpen: true, adminTab: 'systems' });\n    } else {\n      this.setState({ pwError: true });\n    }\n  }\n\n  // ---- category ops ----\n  addCategory() {\n    const name = (this.state.newCatName || '').trim();\n    if (!name) { alert('กรุณากรอกชื่อหมวดหมู่'); return; }\n    const color = this.PALETTE[this.state.categories.length % this.PALETTE.length];\n    this.save({ categories: this.state.categories.concat([{ id: 'c' + Date.now(), label: name, color }]), newCatName: '' });\n  }\n  renameCategory(id, val) { this.save({ categories: this.state.categories.map(c => c.id === id ? Object.assign({}, c, { label: val }) : c) }); }\n  deleteCategory(id) {\n    if (this.state.categories.length <= 1) { alert('ต้องมีอย่างน้อย 1 หมวดหมู่'); return; }\n    if (!confirm('ลบหมวดหมู่นี้? ระบบในหมวดจะถูกย้ายไปหมวดแรก')) return;\n    const remaining = this.state.categories.filter(c => c.id !== id);\n    const fallback = remaining[0].id;\n    this.save({ categories: remaining, systems: this.state.systems.map(s => s.categoryId === id ? Object.assign({}, s, { categoryId: fallback }) : s) });\n  }\n\n  resetDefaults() {\n    if (!confirm('คืนค่าทั้งหมดกลับเป็นค่าเริ่มต้น? การแก้ไขจะหายทั้งหมด')) return;\n    const def = this.defaults();\n    this.save({ systems: def.systems, categories: def.categories, favorites: [], editing: null });\n  }\n  exportConfig() {\n    const data = JSON.stringify({ systems: this.state.systems, categories: this.state.categories, title: this.state.title, subtitle: this.state.subtitle, favorites: this.state.favorites }, null, 2);\n    const blob = new Blob([data], { type: 'application/json' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url; a.download = 'intranet-config.json'; a.click();\n    setTimeout(() => URL.revokeObjectURL(url), 1000);\n  }\n  importConfig(file) {\n    if (!file) return;\n    const r = new FileReader();\n    r.onload = () => {\n      try {\n        const d = JSON.parse(r.result);\n        this.save({ systems: d.systems || [], categories: d.categories || [], favorites: d.favorites || [], title: d.title || this.state.title, subtitle: d.subtitle || this.state.subtitle });\n        alert('นำเข้าการตั้งค่าเรียบร้อย');\n      } catch (e) { alert('ไฟล์ไม่ถูกต้อง'); }\n    };\n    r.readAsText(file);\n  }\n\n  decorate(s) {\n    const cat = this.state.categories.find(c => c.id === s.categoryId);\n    const isFav = this.state.favorites.includes(s.id);\n    return {\n      id: s.id, name: s.name, desc: s.desc, url: s.url, icon: s.icon, color: s.color,\n      tint: this.hexToRgba(s.color, 0.12),\n      categoryLabel: cat ? cat.label : 'ไม่ระบุ',\n      catColor: cat ? cat.color : '#999',\n      isFav, favIcon: isFav ? 'star' : 'star_border',\n      starColor: isFav ? '#E7B53C' : '#c9bfb8',\n      onToggleFav: (e) => { e.preventDefault(); e.stopPropagation(); this.toggleFav(s.id); }\n    };\n  }\n\n  renderVals() {\n    const st = this.state;\n    const accent = this.props.accent || '#9E1B34';\n    const density = this.props.density || 'comfortable';\n    const showClockFlag = this.props.showClock !== false;\n    const heroBg = 'linear-gradient(135deg, ' + this.shade(accent, 8) + ' 0%, ' + this.shade(accent, -22) + ' 100%)';\n\n    const gap = density === 'compact' ? 12 : 18;\n    const minCol = density === 'compact' ? 240 : 280;\n    const cardPad = density === 'compact' ? '16px' : '20px';\n    const gridStyle = { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(' + minCol + 'px, 1fr))', gap: gap + 'px' };\n    const cardStyle = { position: 'relative', display: 'block', background: '#fff', borderRadius: '16px', padding: cardPad, border: '1px solid rgba(0,0,0,.06)', boxShadow: '0 1px 2px rgba(0,0,0,.04)', textDecoration: 'none', transition: 'transform .16s ease, box-shadow .16s ease, border-color .16s ease', cursor: 'pointer' };\n\n    const q = st.search.trim().toLowerCase();\n    const matchQ = s => !q || (s.name + ' ' + (s.desc || '')).toLowerCase().includes(q);\n\n    // chips\n    const chipBase = { fontFamily: \"'IBM Plex Sans Thai', sans-serif\", fontSize: '13px', fontWeight: 600, padding: '7px 14px', borderRadius: '999px', cursor: 'pointer', whiteSpace: 'nowrap', transition: 'all .15s ease' };\n    const mkChipStyle = active => Object.assign({}, chipBase, active\n      ? { background: '#fff', color: this.shade(accent, -10), border: '1px solid #fff' }\n      : { background: 'rgba(255,255,255,.12)', color: 'rgba(255,255,255,.9)', border: '1px solid rgba(255,255,255,.22)' });\n    const visibleAll = st.systems.filter(s => !s.hidden && matchQ(s));\n    const chips = [{ id: 'all', label: 'ทั้งหมด', count: visibleAll.length, active: st.activeCat === 'all', onClick: () => this.setState({ activeCat: 'all' }), style: mkChipStyle(st.activeCat === 'all') }]\n      .concat(st.categories.map(c => {\n        const cnt = visibleAll.filter(s => s.categoryId === c.id).length;\n        return { id: c.id, label: c.label, count: cnt, active: st.activeCat === c.id, onClick: () => this.setState({ activeCat: c.id }), style: mkChipStyle(st.activeCat === c.id) };\n      }));\n\n    // visible filtered systems\n    const visible = st.systems.filter(s => !s.hidden && matchQ(s) && (st.activeCat === 'all' || s.categoryId === st.activeCat));\n    const groups = st.categories.map(c => {\n      const sys = visible.filter(s => s.categoryId === c.id).map(s => this.decorate(s));\n      return { id: c.id, label: c.label, color: c.color, countLabel: sys.length + ' ระบบ', systems: sys };\n    }).filter(g => g.systems.length > 0);\n\n    const showFav = !q && st.activeCat === 'all' && st.favorites.length > 0;\n    const favSystems = showFav ? st.systems.filter(s => !s.hidden && st.favorites.includes(s.id)).map(s => this.decorate(s)) : [];\n    const isEmpty = groups.length === 0;\n\n    // ---- admin: systems list ----\n    const btnSm = { background: 'none', border: 'none', cursor: 'pointer', padding: '5px', lineHeight: 0, color: '#8a807a' };\n    const btnSmDis = Object.assign({}, btnSm, { opacity: .25, cursor: 'default' });\n    const len = st.systems.length;\n    const adminSystems = st.systems.map((s, i) => {\n      const cat = st.categories.find(c => c.id === s.categoryId);\n      return {\n        id: s.id, name: s.name, icon: s.icon, color: s.color, tint: this.hexToRgba(s.color, 0.14),\n        categoryLabel: cat ? cat.label : 'ไม่ระบุ',\n        hiddenTag: s.hidden ? '  ·  ซ่อนอยู่' : '',\n        hideIcon: s.hidden ? 'visibility_off' : 'visibility',\n        rowStyle: { display: 'flex', alignItems: 'center', gap: '11px', background: '#fff', border: '1px solid rgba(0,0,0,.07)', borderRadius: '12px', padding: '10px 11px', opacity: s.hidden ? .55 : 1 },\n        upStyle: i === 0 ? btnSmDis : btnSm,\n        downStyle: i === len - 1 ? btnSmDis : btnSm,\n        onUp: () => this.moveItem('systems', s.id, -1),\n        onDown: () => this.moveItem('systems', s.id, 1),\n        onHide: () => this.toggleHidden(s.id),\n        onEdit: () => this.openEdit(s.id),\n        onDelete: () => this.deleteSystem(s.id)\n      };\n    });\n\n    // ---- admin: categories ----\n    const clen = st.categories.length;\n    const adminCategories = st.categories.map((c, i) => ({\n      id: c.id, label: c.label, color: c.color,\n      countLabel: st.systems.filter(s => s.categoryId === c.id).length + ' ระบบ',\n      upStyle: i === 0 ? btnSmDis : btnSm,\n      downStyle: i === clen - 1 ? btnSmDis : btnSm,\n      onRename: (e) => this.renameCategory(c.id, e.target.value),\n      onUp: () => this.moveItem('categories', c.id, -1),\n      onDown: () => this.moveItem('categories', c.id, 1),\n      onDelete: () => this.deleteCategory(c.id)\n    }));\n\n    // ---- tabs ----\n    const tabBase = { flex: 1, padding: '11px 8px', border: 'none', background: 'none', fontFamily: \"'IBM Plex Sans Thai', sans-serif\", fontSize: '13.5px', fontWeight: 600, cursor: 'pointer', borderBottom: '2.5px solid transparent', color: '#9a8f89', borderRadius: '8px 8px 0 0' };\n    const tabActive = t => Object.assign({}, tabBase, st.adminTab === t ? { color: accent, borderBottomColor: accent } : {});\n\n    // ---- edit modal ----\n    const ed = st.editing;\n    const editingOpen = !!ed;\n    const editColor = ed ? ed.color : '#9E1B34';\n    const colorChoices = this.PALETTE.map(hex => ({\n      hex,\n      onPick: () => this.updateDraft('color', hex),\n      style: { width: '34px', height: '34px', borderRadius: '9px', background: hex, cursor: 'pointer', border: (ed && ed.color === hex) ? '3px solid #221C1A' : '2px solid rgba(0,0,0,.08)', boxShadow: (ed && ed.color === hex) ? '0 0 0 2px #fff inset' : 'none' }\n    }));\n    const iconChoices = this.ICONS.map(name => {\n      const active = ed && ed.icon === name;\n      return {\n        name,\n        onPick: () => this.updateDraft('icon', name),\n        style: { display: 'flex', alignItems: 'center', justifyContent: 'center', height: '44px', borderRadius: '10px', cursor: 'pointer', border: active ? '2px solid ' + editColor : '1px solid rgba(0,0,0,.1)', background: active ? this.hexToRgba(editColor, 0.12) : '#fff', color: active ? editColor : '#6b615c' }\n      };\n    });\n    const catOptions = st.categories.map(c => ({ id: c.id, label: c.label }));\n\n    return {\n      logoSrc: 'assets/logo.png',\n      title: st.title, subtitle: st.subtitle, heroBg,\n      showClockFlag, clock: st.clock,\n      year: new Date().getFullYear() + 543,\n      search: st.search,\n      onSearch: (e) => this.setState({ search: e.target.value }),\n      onOpenAdmin: () => this.requestAdmin(),\n      pwOpen: st.pwOpen, pwValue: st.pwValue, pwError: st.pwError,\n      pwInputStyle: { width: '100%', padding: '12px 14px', border: '1px solid ' + (st.pwError ? '#e3b4b4' : '#ddd2ca'), borderRadius: '11px', fontFamily: \"'IBM Plex Sans Thai', sans-serif\", fontSize: '15px', outline: 'none', textAlign: 'center', letterSpacing: '2px' },\n      onPwInput: (e) => this.setState({ pwValue: e.target.value, pwError: false }),\n      onPwKey: (e) => { if (e.key === 'Enter') this.submitPw(); },\n      onPwSubmit: () => this.submitPw(),\n      onPwCancel: () => this.setState({ pwOpen: false, pwValue: '', pwError: false }),\n      chips, gridStyle, cardStyle,\n      showFav, favSystems, groups, isEmpty,\n\n      // admin shell\n      adminOpen: st.adminOpen,\n      onCloseAdmin: () => this.setState({ adminOpen: false }),\n      tabSystems: st.adminTab === 'systems',\n      tabCats: st.adminTab === 'categories',\n      tabGeneral: st.adminTab === 'general',\n      onTabSystems: () => this.setState({ adminTab: 'systems' }),\n      onTabCats: () => this.setState({ adminTab: 'categories' }),\n      onTabGeneral: () => this.setState({ adminTab: 'general' }),\n      tabSystemsStyle: tabActive('systems'),\n      tabCatsStyle: tabActive('categories'),\n      tabGeneralStyle: tabActive('general'),\n\n      adminSystems, onAddNew: () => this.openNew(),\n      adminCategories,\n      newCatName: st.newCatName,\n      onNewCatName: (e) => this.setState({ newCatName: e.target.value }),\n      onAddCat: () => this.addCategory(),\n\n      titleVal: st.title, subtitleVal: st.subtitle,\n      onTitleChange: (e) => this.save({ title: e.target.value }),\n      onSubtitleChange: (e) => this.save({ subtitle: e.target.value }),\n      onReset: () => this.resetDefaults(),\n      onExport: () => this.exportConfig(),\n      onImportFile: (e) => { const f = e.target.files && e.target.files[0]; this.importConfig(f); e.target.value = ''; },\n\n      // edit modal\n      editingOpen,\n      editHeading: ed && ed._isNew ? 'เพิ่มระบบใหม่' : 'แก้ไขระบบ',\n      editName: ed ? ed.name : '',\n      editDesc: ed ? ed.desc : '',\n      editUrl: ed ? ed.url : '',\n      editCat: ed ? ed.categoryId : '',\n      editIcon: ed ? ed.icon : 'dashboard',\n      editColor, editTint: this.hexToRgba(editColor, 0.14),\n      onEditName: (e) => this.updateDraft('name', e.target.value),\n      onEditDesc: (e) => this.updateDraft('desc', e.target.value),\n      onEditUrl: (e) => this.updateDraft('url', e.target.value),\n      onEditCat: (e) => this.updateDraft('categoryId', e.target.value),\n      colorChoices, iconChoices, catOptions,\n      onSaveEdit: () => this.saveEdit(),\n      onCancelEdit: () => this.cancelEdit()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
